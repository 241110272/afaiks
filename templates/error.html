{% extends "base.html" %}

{% block title %}Error - AFAIKs{% endblock %}

{% block content %}
<div class="card" style="max-width: 600px; margin: 3rem auto; text-align: center;">
    <p style="font-size: 4rem; margin: 0;">⚠️</p>
    <h2 style="margin-top: 1.5rem; margin-bottom: 0.5rem;">Oops! Something went wrong</h2>
    <p style="font-size: 1rem; color: var(--text-secondary); margin: 1rem 0;">{{ error }}</p>
    <div style="margin-top: 2rem;">
        {% if current_user.is_authenticated %}
            <a href="{{ url_for('dashboard') }}" class="button">← Back to Dashboard</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="button">← Return to Login</a>
        {% endif %}
    </div>
</div>
{% endblock %}
