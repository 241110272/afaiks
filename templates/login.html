{% extends 'base.html' %}
{% block title %}Login - AFAIKs{% endblock %}
{% block content %}
<div class="card auth-card">
    <h2>Login</h2>
    <form method="post">
        {{ form.hidden_tag() }}
        <label for="email">Email</label>
        {{ form.email(class='input-field') }}
        <label for="password">Password</label>
        {{ form.password(class='input-field') }}
        {{ form.submit(class='button') }}
    </form>
    <p>Belum punya akun? <a href="{{ url_for('register') }}">Daftar sekarang</a>.</p>
</div>
{% endblock %}
